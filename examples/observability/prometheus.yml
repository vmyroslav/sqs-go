global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Scrape metrics from OTEL collector
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    scrape_interval: 5s
    metrics_path: /metrics

  # Scrape metrics from Prometheus exporter (if using Prometheus exporter directly)
  - job_name: 'sqs-consumer'
    static_configs:
      - targets: ['host.docker.internal:9464']  # Default Prometheus exporter port
    scrape_interval: 5s
    metrics_path: /metrics

  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']